name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: TimberEquip-main
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: TimberEquip-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Verify staging bundle
        run: npm run verify:staging
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY_STAGING }}
          VITE_FIREBASE_PROJECT_ID: timberequip-staging
          VITE_FIREBASE_APP_ID: 1:252674789146:web:7ef151827eb55ef90aa6a3
          VITE_FIREBASE_AUTH_DOMAIN: timberequip-staging.firebaseapp.com
          VITE_FIREBASE_STORAGE_BUCKET: timberequip-staging.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: 252674789146
          VITE_FIREBASE_FIRESTORE_DATABASE_ID: (default)
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          VITE_ALLOW_INDEXING: false

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: staging
    defaults:
      run:
        working-directory: TimberEquip-main
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: TimberEquip-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true
          project_id: timberequip-staging

      - name: Validate staging deploy config
        run: npm run validate:staging:smoke
        env:
          FIREBASE_PROJECT_ID: timberequip-staging
          SMOKE_BASE_URL: https://timberequip-staging.web.app

      - name: Deploy staging
        run: npm run deploy:staging:ci
        env:
          FIREBASE_PROJECT_ID_STAGING: timberequip-staging
          FIREBASE_DEPLOY_SCOPE: ${{ vars.FIREBASE_DEPLOY_SCOPE }}
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          RECAPTCHA_PROJECT_ID: mobile-app-equipment-sales
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY_STAGING }}
          VITE_FIREBASE_PROJECT_ID: timberequip-staging
          VITE_FIREBASE_APP_ID: 1:252674789146:web:7ef151827eb55ef90aa6a3
          VITE_FIREBASE_AUTH_DOMAIN: timberequip-staging.firebaseapp.com
          VITE_FIREBASE_STORAGE_BUCKET: timberequip-staging.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: 252674789146
          VITE_FIREBASE_FIRESTORE_DATABASE_ID: (default)
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          VITE_ALLOW_INDEXING: false

      - name: Smoke test staging routes
        run: npm run smoke:routes
        env:
          SMOKE_BASE_URL: https://timberequip-staging.web.app
          SMOKE_EXPECT_MODE: noindex
