name: PR Verify And Preview

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: TimberEquip-main
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: TimberEquip-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build preview bundle
        run: npm run build:noindex

  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: preview
    defaults:
      run:
        working-directory: TimberEquip-main
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: TimberEquip-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build preview bundle
        run: npm run build:noindex

      - name: Validate preview environment config
        run: npm run validate:preview
        env:
          FIREBASE_PROJECT_ID: timberequip-staging

      - name: Deploy Firebase Hosting preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: timberequip-staging
          channelId: pr-${{ github.event.pull_request.number }}
          expires: 7d
          entryPoint: TimberEquip-main
