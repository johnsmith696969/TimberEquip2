name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: TimberEquip-main
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: TimberEquip-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Verify production bundle
        run: npm run verify:production
        env:
          VITE_FIREBASE_API_KEY: AIzaSyChC_87Qt3KNzsiV9v4Nkz2kIXd9QZ60XQ
          VITE_FIREBASE_PROJECT_ID: mobile-app-equipment-sales
          VITE_FIREBASE_APP_ID: 1:547811102681:web:3065d1745c6b8dac4993c8
          VITE_FIREBASE_AUTH_DOMAIN: mobile-app-equipment-sales.firebaseapp.com
          VITE_FIREBASE_STORAGE_BUCKET: mobile-app-equipment-sales.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: 547811102681
          VITE_FIREBASE_FIRESTORE_DATABASE_ID: ai-studio-206e8e62-feaa-4921-875f-79ff275fa93c
          VITE_GOOGLE_MAPS_API_KEY: AIzaSyDYp5RXU0OLpYpmUKmmE29J4Q-SeaxeQjY
          VITE_RECAPTCHA_SITE_KEY: 6LdxzpIsAAAAADS0ws0EJT-ulSMBH5yO9uAWOqX0
          VITE_ALLOW_INDEXING: true

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: production
    defaults:
      run:
        working-directory: TimberEquip-main
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: TimberEquip-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true
          project_id: ${{ vars.FIREBASE_PROJECT_ID }}

      - name: Validate production deploy config
        run: npm run validate:production:smoke
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          SMOKE_BASE_URL: https://timberequip.com

      - name: Deploy production
        run: npm run deploy:production:ci
        env:
          FIREBASE_PROJECT_ID_PRODUCTION: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_DEPLOY_SCOPE: ${{ vars.FIREBASE_DEPLOY_SCOPE }}
          RECAPTCHA_SITE_KEY: 6LdxzpIsAAAAADS0ws0EJT-ulSMBH5yO9uAWOqX0
          RECAPTCHA_PROJECT_ID: mobile-app-equipment-sales
          VITE_FIREBASE_API_KEY: AIzaSyChC_87Qt3KNzsiV9v4Nkz2kIXd9QZ60XQ
          VITE_FIREBASE_PROJECT_ID: mobile-app-equipment-sales
          VITE_FIREBASE_APP_ID: 1:547811102681:web:3065d1745c6b8dac4993c8
          VITE_FIREBASE_AUTH_DOMAIN: mobile-app-equipment-sales.firebaseapp.com
          VITE_FIREBASE_STORAGE_BUCKET: mobile-app-equipment-sales.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: 547811102681
          VITE_FIREBASE_FIRESTORE_DATABASE_ID: ai-studio-206e8e62-feaa-4921-875f-79ff275fa93c
          VITE_GOOGLE_MAPS_API_KEY: AIzaSyDYp5RXU0OLpYpmUKmmE29J4Q-SeaxeQjY
          VITE_RECAPTCHA_SITE_KEY: 6LdxzpIsAAAAADS0ws0EJT-ulSMBH5yO9uAWOqX0
          VITE_ALLOW_INDEXING: true

      - name: Smoke test production routes
        run: npm run smoke:routes
        env:
          SMOKE_BASE_URL: https://timberequip.com
          SMOKE_EXPECT_MODE: indexable
