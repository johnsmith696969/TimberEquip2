name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: TimberEquip-main
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: TimberEquip-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Verify production bundle
        run: npm run verify:production

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: production
    defaults:
      run:
        working-directory: TimberEquip-main
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: TimberEquip-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true
          project_id: ${{ vars.FIREBASE_PROJECT_ID }}

      - name: Validate production deploy config
        run: npm run validate:production:smoke
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          SMOKE_BASE_URL: https://timberequip.com

      - name: Deploy production
        run: npm run deploy:production:ci
        env:
          FIREBASE_PROJECT_ID_PRODUCTION: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_DEPLOY_SCOPE: ${{ vars.FIREBASE_DEPLOY_SCOPE }}

      - name: Smoke test production routes
        run: npm run smoke:routes
        env:
          SMOKE_BASE_URL: https://timberequip.com
          SMOKE_EXPECT_MODE: indexable
