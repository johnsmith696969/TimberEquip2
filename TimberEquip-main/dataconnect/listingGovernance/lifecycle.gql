# Phase 1 listing governance connector
# These operations are intentionally limited to lifecycle governance.

query GetListingGovernance($id: UUID!) @auth(level: USER) {
  listing(id: $id) {
    id
    legacyFirestoreId
    sellerPartyId
    title
    lifecycleState
    reviewState
    paymentState
    inventoryState
    visibilityState
    publishedAt
    expiresAt
    soldAt
    updatedAt
  }
}

query ListLifecycleQueue(
  $lifecycleStates: [String!]!
  $limit: Int! = 50
) @auth(level: USER) {
  listings(
    where: { lifecycleState: { in: $lifecycleStates } }
    orderBy: { updatedAt: DESC }
    limit: $limit
  ) {
    id
    title
    sellerPartyId
    lifecycleState
    reviewState
    paymentState
    inventoryState
    visibilityState
    updatedAt
  }
}

query ListListingTransitions(
  $listingId: UUID!
  $limit: Int! = 100
) @auth(level: USER) {
  listingStateTransitions(
    where: { listingId: { eq: $listingId } }
    orderBy: { occurredAt: DESC }
    limit: $limit
  ) {
    id
    transitionAction
    previousState
    nextState
    previousReviewState
    nextReviewState
    previousPaymentState
    nextPaymentState
    previousInventoryState
    nextInventoryState
    previousVisibilityState
    nextVisibilityState
    actorType
    actorId
    reasonCode
    reasonNote
    occurredAt
  }
}

query ListOpenListingAnomalies(
  $listingId: UUID!
  $limit: Int! = 50
) @auth(level: USER) {
  listingAnomalies(
    where: {
      listingId: { eq: $listingId }
      status: { eq: "open" }
    }
    orderBy: { detectedAt: DESC }
    limit: $limit
  ) {
    id
    anomalyCode
    severity
    status
    detectedBy
    detectedAt
    resolvedAt
    resolutionNote
  }
}

mutation SubmitListing(
  $id: UUID!
  $actorId: String
  $requestId: String
  $reasonNote: String
) @transaction @auth(level: USER) {
  query {
    listing(id: $id)
      @redact
      @check(message: "Listing not found")
      @check(expr: "this.lifecycleState in ['draft', 'rejected']", message: "Only draft or rejected listings can be submitted")
      @check(expr: "this.title != '' && this.sellerPartyId != '' && this.categoryKey != ''", message: "Listing is missing required submission fields") {
      id
      lifecycleState
      reviewState
      paymentState
      inventoryState
      visibilityState
      title
      sellerPartyId
      categoryKey
    }
  }
  listing_update(
    id: $id
    data: {
      lifecycleState: "submitted"
      reviewState: "pending"
      inventoryState: "draft"
      visibilityState: "private"
      updatedAt_expr: "request.time"
    }
  ) {
    key
  }
  listingStateTransition_insert(
    data: {
      listingId_expr: "response.query.listing.id"
      transitionAction: "submit_listing"
      previousState_expr: "response.query.listing.lifecycleState"
      nextState: "submitted"
      previousReviewState_expr: "response.query.listing.reviewState"
      nextReviewState: "pending"
      previousPaymentState_expr: "response.query.listing.paymentState"
      nextPaymentState_expr: "response.query.listing.paymentState"
      previousInventoryState_expr: "response.query.listing.inventoryState"
      nextInventoryState: "draft"
      previousVisibilityState_expr: "response.query.listing.visibilityState"
      nextVisibilityState: "private"
      reasonNote: $reasonNote
      actorType: "seller"
      actorId: $actorId
      requestId: $requestId
      sourceSystem: "dataconnect"
      metadataJson: {}
      occurredAt_expr: "request.time"
    }
  ) {
    key
  }
}

mutation ApproveListing(
