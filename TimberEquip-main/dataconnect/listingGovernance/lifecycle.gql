# Phase 1 listing governance connector
# These operations are intentionally limited to lifecycle governance.
# Updated for Data Connect SDK v3.2.1+ compatibility.

# Role enforcement happens in the application layer (Cloud Functions / admin SDK).
query GetListingGovernance($id: UUID!) @auth(level: USER) {
  listing(id: $id) {
    id
    legacyFirestoreId
    sellerPartyId
    title
    lifecycleState
    reviewState
    paymentState
    inventoryState
    visibilityState
    publishedAt
    expiresAt
    soldAt
    updatedAt
  }
}

# Role enforcement happens in the application layer (Cloud Functions / admin SDK).
query ListLifecycleQueue(
  $lifecycleStates: [String!]!
  $limit: Int! = 50
) @auth(level: USER) {
  listings(
    where: { lifecycleState: { in: $lifecycleStates } }
    orderBy: { updatedAt: DESC }
    limit: $limit
  ) {
    id
    title
    sellerPartyId
    lifecycleState
    reviewState
    paymentState
    inventoryState
    visibilityState
    updatedAt
  }
}

# Role enforcement happens in the application layer (Cloud Functions / admin SDK).
query ListListingTransitions(
  $listingId: UUID!
  $limit: Int! = 100
) @auth(level: USER) {
  listingStateTransitions(
    where: { listingId: { eq: $listingId } }
    orderBy: { occurredAt: DESC }
    limit: $limit
  ) {
    id
    transitionAction
    previousState
    nextState
    previousReviewState
    nextReviewState
    previousPaymentState
    nextPaymentState
    previousInventoryState
    nextInventoryState
    previousVisibilityState
    nextVisibilityState
    actorType
    actorId
    reasonCode
    reasonNote
    occurredAt
  }
}

# Role enforcement happens in the application layer (Cloud Functions / admin SDK).
query ListOpenListingAnomalies(
  $listingId: UUID!
  $limit: Int! = 50
) @auth(level: USER) {
  listingAnomalies(
    where: {
      listingId: { eq: $listingId }
      status: { eq: "open" }
    }
    orderBy: { detectedAt: DESC }
    limit: $limit
  ) {
    id
    anomalyCode
    severity
    status
    detectedBy
    detectedAt
    resolvedAt
    resolutionNote
  }
}

mutation SubmitListing(
  $id: UUID!
  $actorId: String
  $requestId: String
  $reasonNote: String
) @transaction @auth(level: NO_ACCESS) {
  query {
    listing(id: $id)
      @redact
      @check(expr: "this != null && this.lifecycleState in ['draft', 'rejected'] && this.title != '' && this.sellerPartyId != '' && this.categoryKey != ''", message: "Listing not found, not in a submittable state, or missing required fields") {
      id
      lifecycleState
      reviewState
      paymentState
      inventoryState
      visibilityState
      title
      sellerPartyId
      categoryKey
    }
  }
  listing_update(
    id: $id
    data: {
      lifecycleState: "submitted"
      reviewState: "pending"
      inventoryState: "draft"
      visibilityState: "private"
      updatedAt_expr: "request.time"
    }
  )
  listingStateTransition_insert(
    data: {
      listingId_expr: "response.query.listing.id"
      transitionAction: "submit_listing"
      previousState_expr: "response.query.listing.lifecycleState"
      nextState: "submitted"
      previousReviewState_expr: "response.query.listing.reviewState"
      nextReviewState: "pending"
      previousPaymentState_expr: "response.query.listing.paymentState"
      nextPaymentState_expr: "response.query.listing.paymentState"
      previousInventoryState_expr: "response.query.listing.inventoryState"
      nextInventoryState: "draft"
      previousVisibilityState_expr: "response.query.listing.visibilityState"
      nextVisibilityState: "private"
      reasonNote: $reasonNote
      actorType: "seller"
      actorId: $actorId
      requestId: $requestId
      sourceSystem: "dataconnect"
      metadataJson: {}
      occurredAt_expr: "request.time"
    }
  )
}

mutation ApproveListing(
  $id: UUID!
  $actorId: String
  $requestId: String
  $reasonCode: String
  $reasonNote: String
) @transaction @auth(level: NO_ACCESS) {
  query {
    listing(id: $id)
      @redact
      @check(expr: "this != null && this.lifecycleState == 'submitted'", message: "Listing not found or not in submitted state") {
      id
      lifecycleState
      reviewState
      paymentState
      inventoryState
      visibilityState
    }
  }
  listing_update(
    id: $id
    data: {
      lifecycleState: "approved_unpaid"
      reviewState: "approved"
      visibilityState: "private"
      updatedAt_expr: "request.time"
    }
  )
  listingStateTransition_insert(
    data: {
      listingId_expr: "response.query.listing.id"
      transitionAction: "approve_listing"
      previousState_expr: "response.query.listing.lifecycleState"
      nextState: "approved_unpaid"
      previousReviewState_expr: "response.query.listing.reviewState"
      nextReviewState: "approved"
      previousPaymentState_expr: "response.query.listing.paymentState"
      nextPaymentState_expr: "response.query.listing.paymentState"
      previousInventoryState_expr: "response.query.listing.inventoryState"
      nextInventoryState_expr: "response.query.listing.inventoryState"
      previousVisibilityState_expr: "response.query.listing.visibilityState"
      nextVisibilityState: "private"
      reasonCode: $reasonCode
      reasonNote: $reasonNote
      actorType: "admin"
      actorId: $actorId
      requestId: $requestId
      sourceSystem: "dataconnect"
      metadataJson: {}
      occurredAt_expr: "request.time"
    }
  )
}

