mutation ResolveListingAnomaly(
  $id: UUID!
  $resolutionNote: String!
) @transaction @auth(level: NO_ACCESS) {
  listingAnomaly_update(
    id: $id
    data: {
      status: "resolved"
      resolutionNote: $resolutionNote
      resolvedAt_expr: "request.time"
    }
  )
}
