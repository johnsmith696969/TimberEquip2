mutation ConfirmListingPayment(
  $id: UUID!
  $actorId: String
  $requestId: String
  $reasonCode: String
) @transaction @auth(level: NO_ACCESS) {
  query {
    listing(id: $id)
      @redact
      @check(expr: "this != null && this.lifecycleState == 'approved_unpaid' && this.paymentState in ['pending', 'failed']", message: "Listing not found, not approved_unpaid, or payment not in pending/failed state") {
      id
      lifecycleState
      reviewState
      paymentState
      inventoryState
      visibilityState
    }
  }
  listing_update(
    id: $id
    data: {
      paymentState: "paid"
      updatedAt_expr: "request.time"
    }
  )
  listingStateTransition_insert(
    data: {
      listingId_expr: "response.query.listing.id"
      transitionAction: "confirm_payment"
      previousState_expr: "response.query.listing.lifecycleState"
      nextState_expr: "response.query.listing.lifecycleState"
      previousReviewState_expr: "response.query.listing.reviewState"
      nextReviewState_expr: "response.query.listing.reviewState"
      previousPaymentState_expr: "response.query.listing.paymentState"
      nextPaymentState: "paid"
      previousInventoryState_expr: "response.query.listing.inventoryState"
      nextInventoryState_expr: "response.query.listing.inventoryState"
      previousVisibilityState_expr: "response.query.listing.visibilityState"
      nextVisibilityState_expr: "response.query.listing.visibilityState"
      reasonCode: $reasonCode
      actorType: "billing_webhook"
      actorId: $actorId
      requestId: $requestId
      sourceSystem: "dataconnect"
      metadataJson: {}
      occurredAt_expr: "request.time"
    }
  )
}

mutation PublishListing(
  $id: UUID!
  $actorId: String
  $requestId: String
) @transaction @auth(level: NO_ACCESS) {
  query {
    listing(id: $id)
      @redact
      @check(expr: "this != null && this.lifecycleState in ['approved_unpaid', 'sold'] && this.reviewState == 'approved' && this.paymentState in ['paid', 'waived']", message: "Listing not found, not approved, or payment not confirmed") {
      id
      lifecycleState
      reviewState
      paymentState
      inventoryState
      visibilityState
    }
  }
  listing_update(
    id: $id
    data: {
      lifecycleState: "live"
      inventoryState: "active"
      visibilityState: "public_live"
      publishedAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
  listingStateTransition_insert(
    data: {
      listingId_expr: "response.query.listing.id"
      transitionAction: "publish_listing"
      previousState_expr: "response.query.listing.lifecycleState"
      nextState: "live"
      previousReviewState_expr: "response.query.listing.reviewState"
      nextReviewState_expr: "response.query.listing.reviewState"
      previousPaymentState_expr: "response.query.listing.paymentState"
      nextPaymentState_expr: "response.query.listing.paymentState"
      previousInventoryState_expr: "response.query.listing.inventoryState"
      nextInventoryState: "active"
      previousVisibilityState_expr: "response.query.listing.visibilityState"
      nextVisibilityState: "public_live"
      actorType: "system"
      actorId: $actorId
      requestId: $requestId
      sourceSystem: "dataconnect"
      metadataJson: {}
      occurredAt_expr: "request.time"
    }
  )
}

