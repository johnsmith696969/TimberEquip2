# ─── Mutations ───────────────────────────────────────────────────────

mutation UpsertAuction(
  $id: String!,
  $title: String!,
  $slug: String!,
  $description: String,
  $coverImageUrl: String,
  $startTime: Timestamp!,
  $endTime: Timestamp!,
  $previewStartTime: Timestamp,
  $status: String!,
  $lotCount: Int,
  $totalBids: Int,
  $totalGmv: Float,
  $defaultBuyerPremiumPercent: Float,
  $softCloseThresholdMin: Int,
  $softCloseExtensionMin: Int,
  $staggerIntervalMin: Int,
  $defaultPaymentDeadlineDays: Int,
  $defaultRemovalDeadlineDays: Int,
  $termsAndConditionsUrl: String,
  $featured: Boolean,
  $bannerEnabled: Boolean,
  $bannerImageUrl: String,
  $createdBy: String!
) @auth(level: USER) @transaction {
  auction_upsert(data: {
    id: $id,
    title: $title,
    slug: $slug,
    description: $description,
    coverImageUrl: $coverImageUrl,
    startTime: $startTime,
    endTime: $endTime,
    previewStartTime: $previewStartTime,
    status: $status,
    lotCount: $lotCount,
    totalBids: $totalBids,
    totalGmv: $totalGmv,
    defaultBuyerPremiumPercent: $defaultBuyerPremiumPercent,
    softCloseThresholdMin: $softCloseThresholdMin,
    softCloseExtensionMin: $softCloseExtensionMin,
    staggerIntervalMin: $staggerIntervalMin,
    defaultPaymentDeadlineDays: $defaultPaymentDeadlineDays,
    defaultRemovalDeadlineDays: $defaultRemovalDeadlineDays,
    termsAndConditionsUrl: $termsAndConditionsUrl,
    featured: $featured,
    bannerEnabled: $bannerEnabled,
    bannerImageUrl: $bannerImageUrl,
    createdBy: $createdBy
  })
}

