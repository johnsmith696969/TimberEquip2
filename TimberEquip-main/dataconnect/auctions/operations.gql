mutation InsertAuctionBid(
  $id: String!,
  $auctionId: String!,
  $lotId: String!,
  $bidderId: String!,
  $bidderAnonymousId: String!,
  $amount: Float!,
  $maxBid: Float,
  $type: String!,
  $status: String!,
  $triggeredExtension: Boolean,
  $bidTime: Timestamp!
) @auth(level: USER) @transaction {
  auctionBid_insert(data: {
    id: $id,
    auctionId: $auctionId,
    lotId: $lotId,
    bidderId: $bidderId,
    bidderAnonymousId: $bidderAnonymousId,
    amount: $amount,
    maxBid: $maxBid,
    type: $type,
    status: $status,
    triggeredExtension: $triggeredExtension,
    bidTime: $bidTime
  })
}

mutation UpdateBidStatus($id: String!, $status: String!) @auth(level: USER) @transaction {
  auctionBid_update(id: $id, data: {
    status: $status
  })
}

