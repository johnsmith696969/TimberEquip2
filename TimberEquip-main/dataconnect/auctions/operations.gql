## Auction connector — queries and mutations for the auction platform.
## Used by server.ts bid/settlement endpoints and Cloud Functions admin SDK.

# ─── Auction Queries ─────────────────────────────────────────────────

query GetAuctionById($id: String!) @auth(level: PUBLIC) {
  auction(id: $id) {
    id
    title
    slug
    description
    coverImageUrl
    startTime
    endTime
    previewStartTime
    status
    lotCount
    totalBids
    totalGmv
    defaultBuyerPremiumPercent
    softCloseThresholdMin
    softCloseExtensionMin
    staggerIntervalMin
    defaultPaymentDeadlineDays
    defaultRemovalDeadlineDays
    termsAndConditionsUrl
    featured
    bannerEnabled
    bannerImageUrl
    createdBy
    createdAt
    updatedAt
  }
}

query GetAuctionBySlug($slug: String!) @auth(level: PUBLIC) {
  auctions(where: { slug: { eq: $slug } }, limit: 1) {
    id
    title
    slug
    description
    coverImageUrl
    startTime
    endTime
    previewStartTime
    status
    lotCount
    totalBids
    featured
    createdAt
  }
}

query ListActiveAuctions($limit: Int = 20) @auth(level: PUBLIC) {
  auctions(
    where: { status: { in: ["preview", "active"] } }
    orderBy: [{ startTime: ASC }]
    limit: $limit
  ) {
    id
    title
    slug
    coverImageUrl
    startTime
    endTime
    status
    lotCount
    totalBids
    featured
  }
}

query ListAuctionsByStatus($status: String!, $limit: Int = 50) @auth(level: USER) {
  auctions(
    where: { status: { eq: $status } }
    orderBy: [{ startTime: DESC }]
    limit: $limit
  ) {
    id
    title
    slug
    startTime
    endTime
    status
    lotCount
    totalBids
    totalGmv
    createdAt
  }
}

# ─── Lot Queries ─────────────────────────────────────────────────────

query GetLotsByAuction($auctionId: String!) @auth(level: PUBLIC) {
