# ─── Bid Queries ─────────────────────────────────────────────────────

query GetBidsByLot($auctionId: String!, $lotId: String!, $limit: Int = 100) @auth(level: USER) {
  auctionBids(
    where: { auctionId: { eq: $auctionId }, lotId: { eq: $lotId } }
    orderBy: [{ bidTime: DESC }]
    limit: $limit
  ) {
    id
    bidderId
    bidderAnonymousId
    amount
    maxBid
    type
    status
    triggeredExtension
    bidTime
  }
}

query GetBidsByBidder($bidderId: String!, $limit: Int = 100) @auth(level: USER) {
  auctionBids(
    where: { bidderId: { eq: $bidderId } }
    orderBy: [{ bidTime: DESC }]
    limit: $limit
  ) {
    id
    auctionId
    lotId
    amount
    status
    bidTime
  }
}

