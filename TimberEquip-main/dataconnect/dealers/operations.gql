# ─── Mutations ──────────────────────────────────────────────────────

mutation UpsertDealerFeedProfile(
  $id: String!,
  $sellerUid: String!,
  $dealerName: String,
  $dealerEmail: String,
  $sourceName: String,
  $sourceType: String,
  $rawInput: String,
  $feedUrl: String,
  $apiEndpoint: String,
  $status: String,
  $syncMode: String,
  $syncFrequency: String,
  $nightlySyncEnabled: Boolean,
  $autoPublish: Boolean,
  $fieldMapping: Any,
  $apiKeyPreview: String,
  $totalListingsSynced: Int,
  $totalListingsActive: Int,
  $totalListingsCreated: Int,
  $totalListingsUpdated: Int,
  $totalListingsDeleted: Int,
  $lastSyncAt: Timestamp,
  $nextSyncAt: Timestamp,
  $lastSyncStatus: String,
  $lastSyncMessage: String,
  $lastResolvedType: String
) @auth(level: NO_ACCESS) @transaction {
  dealerFeedProfile_upsert(data: {
    id: $id,
    sellerUid: $sellerUid,
    dealerName: $dealerName,
    dealerEmail: $dealerEmail,
    sourceName: $sourceName,
    sourceType: $sourceType,
    rawInput: $rawInput,
    feedUrl: $feedUrl,
    apiEndpoint: $apiEndpoint,
    status: $status,
    syncMode: $syncMode,
    syncFrequency: $syncFrequency,
    nightlySyncEnabled: $nightlySyncEnabled,
    autoPublish: $autoPublish,
    fieldMapping: $fieldMapping,
    apiKeyPreview: $apiKeyPreview,
    totalListingsSynced: $totalListingsSynced,
    totalListingsActive: $totalListingsActive,
    totalListingsCreated: $totalListingsCreated,
    totalListingsUpdated: $totalListingsUpdated,
    totalListingsDeleted: $totalListingsDeleted,
    lastSyncAt: $lastSyncAt,
    nextSyncAt: $nextSyncAt,
    lastSyncStatus: $lastSyncStatus,
    lastSyncMessage: $lastSyncMessage,
    lastResolvedType: $lastResolvedType
  })
}

mutation UpdateDealerFeedProfileSyncStats(
  $id: String!,
  $totalListingsSynced: Int,
  $totalListingsActive: Int,
  $totalListingsCreated: Int,
  $totalListingsUpdated: Int,
  $totalListingsDeleted: Int,
  $lastSyncAt: Timestamp,
  $lastSyncStatus: String,
  $lastSyncMessage: String
) @auth(level: NO_ACCESS) @transaction {
  dealerFeedProfile_update(id: $id, data: {
    totalListingsSynced: $totalListingsSynced,
    totalListingsActive: $totalListingsActive,
    totalListingsCreated: $totalListingsCreated,
    totalListingsUpdated: $totalListingsUpdated,
    totalListingsDeleted: $totalListingsDeleted,
    lastSyncAt: $lastSyncAt,
    lastSyncStatus: $lastSyncStatus,
    lastSyncMessage: $lastSyncMessage
  })
}

