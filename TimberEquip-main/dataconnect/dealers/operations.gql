  $actorRole: String,
  $sourceName: String,
  $totalReceived: Int,
  $processed: Int,
  $created: Int,
  $updated: Int,
  $upserted: Int,
  $skipped: Int,
  $archived: Int,
  $errorCount: Int,
  $errors: Any,
  $dryRun: Boolean,
  $syncContext: Any,
  $processedAt: Timestamp
) @auth(level: NO_ACCESS) @transaction {
  dealerFeedIngestLog_insert(data: {
    id: $id,
    feedId: $feedId,
    sellerUid: $sellerUid,
    actorUid: $actorUid,
    actorRole: $actorRole,
    sourceName: $sourceName,
    totalReceived: $totalReceived,
    processed: $processed,
    created: $created,
    updated: $updated,
    upserted: $upserted,
    skipped: $skipped,
    archived: $archived,
    errorCount: $errorCount,
    errors: $errors,
    dryRun: $dryRun,
    syncContext: $syncContext,
    processedAt: $processedAt
  })
}

