## Dealer System connector — queries and mutations.
## Used by DealerOS, BulkImportToolkit, admin dashboard, and Cloud Functions.

# ─── Dealer Feed Profile Queries ────────────────────────────────────

query GetDealerFeedProfileById($id: String!) @auth(level: NO_ACCESS) {
  dealerFeedProfile(id: $id) {
    id
    sellerUid
    dealerName
    dealerEmail
    sourceName
    sourceType
    feedUrl
    apiEndpoint
    status
    syncMode
    syncFrequency
    nightlySyncEnabled
    autoPublish
    fieldMapping
    apiKeyPreview
    totalListingsSynced
    totalListingsActive
    totalListingsCreated
    totalListingsUpdated
    totalListingsDeleted
    lastSyncAt
    nextSyncAt
    lastSyncStatus
    lastSyncMessage
    lastResolvedType
    createdAt
    updatedAt
  }
}

query ListDealerFeedProfilesBySeller($sellerUid: String!) @auth(level: NO_ACCESS) {
  dealerFeedProfiles(
    where: { sellerUid: { eq: $sellerUid } }
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    dealerName
    sourceName
    sourceType
    status
    syncMode
    syncFrequency
    nightlySyncEnabled
    totalListingsSynced
    totalListingsActive
    lastSyncAt
    lastSyncStatus
    createdAt
  }
}

query ListDealerFeedProfilesByStatus($status: String!, $limit: Int = 50) @auth(level: NO_ACCESS) {
  dealerFeedProfiles(
    where: { status: { eq: $status } }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
  ) {
    id
    sellerUid
    dealerName
    sourceName
    status
    totalListingsSynced
    lastSyncAt
    lastSyncStatus
    createdAt
  }
}

# ─── Dealer Listing Queries ─────────────────────────────────────────

query ListDealerListingsByFeed($dealerFeedId: String!, $limit: Int = 100) @auth(level: NO_ACCESS) {
  dealerListings(
    where: { dealerFeedId: { eq: $dealerFeedId } }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
  ) {
    id
    dealerFeedId
    sellerUid
    externalListingId
    timberequipListingId
    equipmentHash
    status
    dealerSourceUrl
    dataSource
    externalData
    mappedData
    syncedAt
    createdAt
    updatedAt
  }
}

query ListDealerListingsBySeller($sellerUid: String!, $limit: Int = 100) @auth(level: NO_ACCESS) {
  dealerListings(
    where: { sellerUid: { eq: $sellerUid } }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
  ) {
    id
    dealerFeedId
    externalListingId
    timberequipListingId
    status
    syncedAt
    createdAt
  }
}

query GetDealerListingByHash($equipmentHash: String!) @auth(level: NO_ACCESS) {
  dealerListings(
    where: { equipmentHash: { eq: $equipmentHash } }
    limit: 1
  ) {
    id
    dealerFeedId
    externalListingId
    timberequipListingId
    status
  }
}

