mutation InsertCallLog(
  $id: String!,
  $listingId: String,
  $listingTitle: String,
  $sellerUid: String,
  $sellerName: String,
  $sellerPhone: String,
  $callerUid: String,
  $callerName: String,
  $callerEmail: String,
  $callerPhone: String,
  $duration: Int,
  $status: String!,
  $source: String,
  $isAuthenticated: Boolean,
  $recordingUrl: String,
  $twilioCallSid: String,
  $completedAt: Timestamp
) @auth(level: NO_ACCESS) @transaction {
  callLog_insert(data: {
    id: $id,
    listingId: $listingId,
    listingTitle: $listingTitle,
    sellerUid: $sellerUid,
    sellerName: $sellerName,
    sellerPhone: $sellerPhone,
    callerUid: $callerUid,
    callerName: $callerName,
    callerEmail: $callerEmail,
    callerPhone: $callerPhone,
    duration: $duration,
    status: $status,
    source: $source,
    isAuthenticated: $isAuthenticated,
    recordingUrl: $recordingUrl,
    twilioCallSid: $twilioCallSid,
    completedAt: $completedAt
  })
}

mutation InsertContactRequest(
  $id: String!,
  $name: String,
  $email: String!,
  $category: String,
  $message: String,
  $source: String,
  $status: String
) @auth(level: NO_ACCESS) @transaction {
  contactRequest_insert(data: {
    id: $id,
    name: $name,
    email: $email,
    category: $category,
    message: $message,
    source: $source,
    status: $status
  })
}

mutation UpdateContactRequestStatus($id: String!, $status: String!) @auth(level: NO_ACCESS) @transaction {
  contactRequest_update(id: $id, data: {
    status: $status
  })
}
