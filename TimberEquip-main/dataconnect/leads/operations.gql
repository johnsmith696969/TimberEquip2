## Leads & Inquiries connector — queries and mutations.
## Used by InquiryModal, admin lead management, and Cloud Functions.

# ─── Inquiry Queries ────────────────────────────────────────────────

query GetInquiryById($id: String!) @auth(level: NO_ACCESS) {
  inquiry(id: $id) {
    id
    listingId
    sellerUid
    buyerUid
    buyerName
    buyerEmail
    buyerPhone
    message
    type
    status
    assignedToUid
    assignedToName
    internalNotes
    firstResponseAt
    responseTimeMinutes
    spamScore
    spamFlags
    contactConsentAccepted
    contactConsentVersion
    contactConsentScope
    contactConsentAt
    createdAt
    updatedAt
  }
}

query ListInquiriesBySeller($sellerUid: String!, $limit: Int = 50) @auth(level: NO_ACCESS) {
  inquiries(
    where: { sellerUid: { eq: $sellerUid } }
    orderBy: [{ createdAt: DESC }]
    limit: $limit
  ) {
    id
    listingId
    buyerName
    buyerEmail
    buyerPhone
    message
    type
    status
    assignedToName
    firstResponseAt
    responseTimeMinutes
    spamScore
    createdAt
  }
}

query ListInquiriesByBuyer($buyerUid: String!, $limit: Int = 50) @auth(level: NO_ACCESS) {
  inquiries(
    where: { buyerUid: { eq: $buyerUid } }
