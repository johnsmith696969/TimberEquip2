# ─── Mutations ──────────────────────────────────────────────────────

mutation UpsertInquiry(
  $id: String!,
  $listingId: String,
  $sellerUid: String,
  $buyerUid: String,
  $buyerName: String!,
  $buyerEmail: String!,
  $buyerPhone: String,
  $message: String,
  $type: String!,
  $status: String!,
  $assignedToUid: String,
  $assignedToName: String,
  $internalNotes: Any,
  $firstResponseAt: Timestamp,
  $responseTimeMinutes: Int,
  $spamScore: Float,
  $spamFlags: Any,
  $contactConsentAccepted: Boolean,
  $contactConsentVersion: String,
  $contactConsentScope: String,
  $contactConsentAt: Timestamp
) @auth(level: NO_ACCESS) @transaction {
  inquiry_upsert(data: {
    id: $id,
    listingId: $listingId,
    sellerUid: $sellerUid,
    buyerUid: $buyerUid,
    buyerName: $buyerName,
    buyerEmail: $buyerEmail,
    buyerPhone: $buyerPhone,
    message: $message,
    type: $type,
    status: $status,
    assignedToUid: $assignedToUid,
    assignedToName: $assignedToName,
    internalNotes: $internalNotes,
    firstResponseAt: $firstResponseAt,
    responseTimeMinutes: $responseTimeMinutes,
    spamScore: $spamScore,
    spamFlags: $spamFlags,
    contactConsentAccepted: $contactConsentAccepted,
    contactConsentVersion: $contactConsentVersion,
    contactConsentScope: $contactConsentScope,
    contactConsentAt: $contactConsentAt
  })
}

mutation UpdateInquiryStatus(
  $id: String!,
  $status: String!,
  $assignedToUid: String,
  $assignedToName: String,
  $firstResponseAt: Timestamp,
  $responseTimeMinutes: Int
) @auth(level: NO_ACCESS) @transaction {
  inquiry_update(id: $id, data: {
    status: $status,
    assignedToUid: $assignedToUid,
    assignedToName: $assignedToName,
    firstResponseAt: $firstResponseAt,
    responseTimeMinutes: $responseTimeMinutes
  })
}

mutation UpsertFinancingRequest(
  $id: String!,
  $listingId: String,
  $sellerUid: String,
  $buyerUid: String,
  $applicantName: String!,
